name: CI

# Runs on every push and pull request to main. No AWS credentials needed.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (flake8)
        run: |
          flake8 simulator fog_node shared cloud \
            --max-line-length=120 \

      - name: Run unit tests (pytest)
        run: |
          pytest tests/ -v
